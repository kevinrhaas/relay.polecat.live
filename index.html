<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="description" content="Relay — a serverless, peer-to-peer collaborative table. Your data lives in your browser and syncs directly with the people you trust."/>
  <meta name="theme-color" content="#0a0a0f"/>
  <title>Relay · polecat.live</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <!-- avoid theme flash: apply saved preference before paint -->
  <script>
    (function(){try{
      var p=localStorage.getItem('relay.theme')||'dark';
      var light=p==='light'||(p==='system'&&matchMedia('(prefers-color-scheme: light)').matches);
      document.documentElement.setAttribute('data-theme',light?'light':'dark');
    }catch(e){}})();
  </script>
</head>
<body>
  <div class="aurora" aria-hidden="true"><span></span><span></span><span></span></div>
  <div id="app"></div>
  <div id="toasts"></div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
