<!doctype html>
<html lang="en" data-palette="polecat" data-theme="dark">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <meta name="description" content="Relay — a serverless, peer-to-peer collaborative table. Your data lives in your browser and syncs directly with the people you trust."/>
  <meta name="theme-color" content="#0a0a0f"/>
  <title>Relay · polecat.live</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
  <link rel="manifest" href="/manifest.json"/>
  <!-- Polecat Shell (vendored, read-only) — tokens first, then shell chrome,
       then the app's own design system so app rules win ties. -->
  <link rel="stylesheet" href="/vendor/polecat-shell/tokens.css"/>
  <link rel="stylesheet" href="/vendor/polecat-shell/shell.css"/>
  <link rel="stylesheet" href="/css/styles.css"/>
  <!-- avoid theme flash: stamp palette+mode before paint (shell prepaint
       pattern), migrating the legacy bare-mode value ('dark') in place -->
  <script>
    (function(){try{
      var k='relay.theme',v=localStorage.getItem(k);
      if(v&&v.indexOf(':')<0){v='polecat:'+v;localStorage.setItem(k,v);}
      v=v||'polecat:dark';
      var p=v.split(':'),m=p[1]||'dark';
      if(m==='system')m=matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';
      var d=document.documentElement;
      d.setAttribute('data-palette',p[0]);d.setAttribute('data-theme',m);
      var r=localStorage.getItem(k+'.motion');
      if(r==='1'||(r!=='0'&&matchMedia('(prefers-reduced-motion: reduce)').matches))d.setAttribute('data-reduce-motion','1');
    }catch(e){}})();
  </script>
</head>
<body>
  <div class="aurora" aria-hidden="true"><span></span><span></span><span></span></div>
  <div id="app"></div>
  <div id="toasts"></div>
  <script type="module" src="/js/app.js"></script>
  <script>
    // Offline app shell (vendored sw-template pattern) — scoped to /app/
    // only so it never shadows the marketing site at /.
    if('serviceWorker' in navigator){
      window.addEventListener('load', ()=>{
        navigator.serviceWorker.register('/sw.js', { scope:'/app/' }).catch(()=>{});
      });
    }
  </script>
</body>
</html>
