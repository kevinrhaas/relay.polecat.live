name = "relay-rendezvous"
main = "worker.js"
compatibility_date = "2024-09-01"

# One Durable Object per room, holding only in-memory presence + relaying
# WebRTC handshakes. No storage bindings — nothing is persisted.
[[durable_objects.bindings]]
name = "ROOMS"
class_name = "Room"

[[migrations]]
tag = "v1"
new_classes = ["Room"]
